services:
  db:
    image: postgres:15-alpine
    container_name: google-keep-db
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: google_keep_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: ./backend
    container_name: google-keep-api
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
    env_file:
      - ./backend/.env

  web:
    build: ./frontend
    container_name: google-keep-web
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app 
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data: